<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Controle de Atividades</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        CONTROLE AC
    </div>

    <nav>
        <a href="#" class="active">
            <i class="fas fa-home"></i> Início
        </a>

        <a href="#">
            <i class="fas fa-tasks"></i> Atividades
        </a>

        <a href="{{ url_for('main.logout') }}" class="logout">
            <i class="fas fa-sign-out-alt"></i> Sair
        </a>
    </nav>

</div>

<main class="content">

    <header class="main-header">

        <div class="user-info">
            <h1>Bem-vindo, <span>{{ nome }}</span> 👋</h1>
            <p>Esta é sua plataforma de controle de atividades.</p>
        </div>

    </header>


    <section class="tasks-container">

        <div class="tasks-controls">
            <h2>
                <i class="fas fa-tasks"></i>
                Minhas Atividades
            </h2>
        </div>

        <div class="task-grid">

            <!-- Mensagem temporária até o CRUD de tarefas -->
            <div class="empty-state">

                <i class="fas fa-clipboard-list"></i>

                <h3>Nenhuma atividade cadastrada</h3>

                <p>
                    Na próxima etapa do projeto será possível criar
                    e gerenciar suas atividades aqui.
                </p>

            </div>

        </div>

    </section>

</main>


<button id="theme-toggle" class="theme-btn" title="Alternar Tema">
    <i id="theme-icon" class="fas fa-sun"></i>
</button>


<script>

const themeBtn = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');

themeBtn.addEventListener('click', () => {

    document.body.classList.toggle('light-mode');

    if (document.body.classList.contains('light-mode')) {

        themeIcon.classList.replace('fa-sun','fa-moon');
        localStorage.setItem('theme','light');

    } else {

        themeIcon.classList.replace('fa-moon','fa-sun');
        localStorage.setItem('theme','dark');

    }

});


if(localStorage.getItem('theme') === 'light'){

    document.body.classList.add('light-mode');
    themeIcon.classList.replace('fa-sun','fa-moon');

}

</script>

</body>
</html>
